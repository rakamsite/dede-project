name: Apply birthday picker

on:
  push:
    branches:
      - agent/persian-birthday-picker
    paths:
      - tools/apply-birthday-picker.py
      - .github/workflows/apply-birthday-picker.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: agent/persian-birthday-picker
          fetch-depth: 0

      - name: Apply birthday picker changes
        run: python3 tools/apply-birthday-picker.py

      - name: Check PHP syntax and birthday rules
        run: |
          set -Eeuo pipefail
          find wp-content/plugins/dede-store-features -type f -name '*.php' -print0 | xargs -0 -r -n 1 php -l
          php tools/tests/birthday-validation.php

      - name: Check JavaScript syntax
        run: |
          set -Eeuo pipefail
          node --check wp-content/plugins/dede-store-features/assets/js/customer-profile.js
          node --check wp-content/plugins/dede-store-features/assets/js/customer-profile-guard.js
          node --check wp-content/plugins/dede-store-features/assets/js/birthday-picker.js

      - name: Commit generated source
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wp-content/plugins/dede-store-features tools/tests/birthday-validation.php tools/cpanel-initial-deploy-files.txt .github/workflows/quality-check.yml docs/CUSTOMER-PROFILE-MIGRATION.md docs/CUSTOMER-PROFILE-TEST-RESULTS.md
          git diff --cached --quiet && exit 0
          git commit -m "افزودن تقویم شمسی و محدودیت حداقل سن ۱۵ سال"
          git push origin HEAD:agent/persian-birthday-picker
