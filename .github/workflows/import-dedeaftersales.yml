name: Import dedeaftersales

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/import/dedeaftersales.zip
      - .github/workflows/import-dedeaftersales.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-dedeaftersales
          fetch-depth: 0
      - name: Extract plugin source
        run: |
          set -Eeuo pipefail
          unzip -t tools/import/dedeaftersales.zip
          rm -rf /tmp/dedeaftersales-import wp-content/plugins/dedeaftersales
          mkdir -p /tmp/dedeaftersales-import wp-content/plugins
          unzip -q tools/import/dedeaftersales.zip -d /tmp/dedeaftersales-import
          test -f /tmp/dedeaftersales-import/dedeaftersales/simple-ticket-system.php
          cp -a /tmp/dedeaftersales-import/dedeaftersales wp-content/plugins/dedeaftersales
      - name: Validate imported plugin
        run: |
          set -Eeuo pipefail
          find wp-content/plugins/dedeaftersales -type f -name '*.php' -print0 | xargs -0 -r -n 1 php -l
          find wp-content/plugins/dedeaftersales/assets/js -type f -name '*.js' -print0 | xargs -0 -r -n 1 node --check
      - name: Commit imported source
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wp-content/plugins/dedeaftersales
          git diff --cached --quiet && exit 0
          git commit -m "افزودن سورس افزونه خدمات پس از فروش"
          git push origin HEAD:agent/add-dedeaftersales
