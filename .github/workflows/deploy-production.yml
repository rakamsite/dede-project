name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dede-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy current main to dede.ir
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate deployment files
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n tools/cpanel-api-deploy.sh
          bash -n tools/cpanel-deploy.sh

          while IFS= read -r root || [ -n "$root" ]; do
            root="${root%$'\r'}"
            [[ -z "$root" || "$root" == \#* ]] && continue
            path="${root%/}"
            [ -d "$path" ] || continue
            find "$path" -type f -name '*.php' -print0
          done < tools/cpanel-deploy-allowlist.txt \
            | xargs -0 -r -n 1 php -l

      - name: Read current cPanel production state
        id: cpanel_state
        shell: bash
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_REPOSITORY_ROOT: /home/dedeir/repositories/dede
        run: |
          set -Eeuo pipefail
          deployed_sha="$(bash tools/cpanel-api-deploy.sh --current-deployed-sha)"
          if [ -n "$deployed_sha" ]; then
            [[ "$deployed_sha" =~ ^[0-9a-fA-F]{40}$ ]] || {
              echo "cPanel returned an invalid deployed SHA: $deployed_sha" >&2
              exit 1
            }
            echo "deployed_sha=$deployed_sha" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare last-known-good rollback tag
        id: baseline
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin --tags --force

          target_sha="$(git rev-parse HEAD)"
          cpanel_production="${{ steps.cpanel_state.outputs.deployed_sha }}"
          tagged_production="$(git rev-parse 'refs/tags/production-current^{commit}' 2>/dev/null || true)"
          baseline_sha="$cpanel_production"

          if [ -z "$baseline_sha" ]; then
            baseline_sha="$tagged_production"
          fi

          if [ -n "$baseline_sha" ]; then
            git cat-file -e "${baseline_sha}^{commit}"
            git merge-base --is-ancestor "$baseline_sha" origin/main || {
              echo "Current cPanel production commit is not an ancestor of main: $baseline_sha" >&2
              exit 1
            }

            git tag -f production-current "$baseline_sha"
            git push origin +refs/tags/production-current

            if [ "$baseline_sha" != "$target_sha" ]; then
              git tag -f production-previous "$baseline_sha"
              git push origin +refs/tags/production-previous
              echo "previous_sha=$baseline_sha" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Deploy through cPanel API
        id: deploy
        shell: bash
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_REPOSITORY_ROOT: /home/dedeir/repositories/dede
          CPANEL_BRANCH: main
          PRODUCTION_HEALTHCHECK_URL: https://dede.ir/
        run: |
          set -Eeuo pipefail
          target_sha="$(git rev-parse HEAD)"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          bash tools/cpanel-api-deploy.sh "$target_sha"

      - name: Record successful production version
        shell: bash
        env:
          TARGET_SHA: ${{ steps.deploy.outputs.target_sha }}
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin --tags --force

          old_production="${{ steps.baseline.outputs.previous_sha }}"

          git tag -f production-current "$TARGET_SHA"
          git push origin +refs/tags/production-current

          timestamp="$(date -u '+%Y%m%d-%H%M%S')"
          immutable_tag="production-${timestamp}-${GITHUB_RUN_ID}-${TARGET_SHA:0:7}"
          git tag "$immutable_tag" "$TARGET_SHA"
          git push origin "refs/tags/$immutable_tag"

          {
            echo "## Production deployment"
            echo "- Commit: \`$TARGET_SHA\`"
            echo "- Snapshot tag: \`$immutable_tag\`"
            if [ -n "$old_production" ]; then
              echo "- Previous production: \`$old_production\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
