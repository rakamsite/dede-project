name: Quality check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-checks:
    name: PHP, JavaScript and deploy script checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure PHP CLI is available
        shell: bash
        run: |
          set -Eeuo pipefail
          if ! command -v php >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y php-cli
          fi
          php --version

      - name: Check PHP syntax
        shell: bash
        run: |
          set -Eeuo pipefail
          find wp-content/plugins/dede-store-features -type f -name '*.php' -print0 \
            | xargs -0 -r -n 1 php -l
          find wp-content/plugins/dedeaftersales -type f -name '*.php' -print0 \
            | xargs -0 -r -n 1 php -l
          php -l wp-content/themes/DeDeTemPlate/woocommerce/myaccount/my-account.php
          php -l wp-content/themes/DeDeTemPlate/woocommerce/checkout/form-checkout.php

      - name: Test national code validation
        shell: bash
        run: |
          set -Eeuo pipefail
          php tools/tests/national-code-validation.php

      - name: Test birthday validation
        shell: bash
        run: |
          set -Eeuo pipefail
          php tools/tests/birthday-validation.php

      - name: Test contact and postcode validation
        shell: bash
        run: |
          set -Eeuo pipefail
          php tools/tests/contact-validation.php

      - name: Test profile rules
        shell: bash
        run: |
          set -Eeuo pipefail
          php tools/tests/profile-rules.php

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -Eeuo pipefail
          node --check wp-content/plugins/dede-store-features/assets/js/customer-profile.js
          node --check wp-content/plugins/dede-store-features/assets/js/customer-profile-guard.js
          node --check wp-content/plugins/dede-store-features/assets/js/birthday-picker.js
          node --check wp-content/plugins/dede-store-features/assets/js/profile-contact-enhancements.js
          node --check wp-content/plugins/dede-store-features/assets/js/landline-minimum-five-digits.js
          find wp-content/plugins/dedeaftersales/assets/js -type f -name '*.js' -print0 \
            | xargs -0 -r -n 1 node --check

      - name: Check after-sales CSS scope
        shell: bash
        run: |
          set -Eeuo pipefail
          if grep -RInE '^[[:space:]]*(button|input|select|textarea|table|th|td|tr)([[:space:]:,{.#\[])|^[[:space:]]*\.container[[:space:]]*\{' wp-content/plugins/dedeaftersales/assets/css; then
            echo 'Unscoped global selector found in dedeaftersales CSS.' >&2
            exit 1
          fi

      - name: Check cPanel deploy script syntax
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n tools/cpanel-deploy.sh
